    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" type="button" aria-label="Close photo viewer">&times;</button>
        <button class="lightbox-prev" type="button" aria-label="Previous photo"></button>
        <button class="lightbox-next" type="button" aria-label="Next photo"></button>
        <img class="lightbox-content" id="lightbox-img" alt="">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
    
    <script>
        window.addEventListener('load', function() {
            document.body.style.opacity = 1;

            const warmWhenIdle = window.requestIdleCallback || ((callback) => window.setTimeout(callback, 500));
            warmWhenIdle(() => warmPhotoSequence(0));
        });
        
        // Lightbox functionality
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');
        const closeBtn = document.querySelector('.lightbox-close');
        const prevBtn = document.querySelector('.lightbox-prev');
        const nextBtn = document.querySelector('.lightbox-next');
        
        let currentPhotoIndex = 0;
        let isTransitioning = false;
        const photoItems = Array.from(document.querySelectorAll('.photo-item img'));
        const decodedPhotoCache = new Map();

        function normalizePhotoIndex(index) {
            if (index < 0) return photoItems.length - 1;
            if (index >= photoItems.length) return 0;
            return index;
        }

        function getPhotoData(index) {
            const img = photoItems[index];
            return {
                src: img.dataset.full || img.src,
                alt: img.alt || 'Photography image',
                caption: img.nextElementSibling ? img.nextElementSibling.textContent : ''
            };
        }

        function decodePhoto(src) {
            if (decodedPhotoCache.has(src)) {
                return decodedPhotoCache.get(src);
            }

            const preview = new Image();
            preview.decoding = 'async';
            preview.src = src;

            const fallbackReady = new Promise((resolve) => {
                preview.onload = () => resolve(preview);
                preview.onerror = () => resolve(preview);
            });

            const decoded = preview.decode
                ? preview.decode().then(() => preview).catch(() => fallbackReady)
                : fallbackReady;

            decodedPhotoCache.set(src, decoded);
            return decoded;
        }

        function preloadPhoto(index) {
            return decodePhoto(getPhotoData(index).src);
        }

        function warmPhotoSequence(startIndex) {
            const sequence = [
                startIndex,
                startIndex + 1,
                startIndex - 1,
                ...photoItems.map((_, index) => index)
            ];
            const uniqueSequence = [...new Set(sequence.map(normalizePhotoIndex))];

            uniqueSequence.reduce((chain, index) => {
                return chain.then(() => preloadPhoto(index));
            }, Promise.resolve());
        }
        
        function setPhoto(index) {
            currentPhotoIndex = index;
            const photo = getPhotoData(index);
            lightboxImg.src = photo.src;
            lightboxImg.alt = photo.alt;
            lightboxCaption.textContent = photo.caption;
        }

        function openLightbox(index) {
            setPhoto(index);
            lightbox.classList.add('is-open');
            document.body.classList.add('lightbox-open');
            warmPhotoSequence(index);
        }

        function closeLightbox() {
            lightbox.classList.remove('is-open', 'is-loading');
            document.body.classList.remove('lightbox-open');
            lightboxImg.classList.remove('is-exiting-next', 'is-exiting-prev', 'is-entering-next', 'is-entering-prev');
            lightboxCaption.classList.remove('is-changing');
            isTransitioning = false;
        }

        async function showPhoto(index, direction = 0) {
            const nextIndex = normalizePhotoIndex(index);

            if (!lightbox.classList.contains('is-open')) {
                setPhoto(nextIndex);
                return;
            }

            if (isTransitioning || nextIndex === currentPhotoIndex) {
                return;
            }

            isTransitioning = true;
            lightbox.classList.add('is-loading');
            await preloadPhoto(nextIndex);
            lightbox.classList.remove('is-loading');

            const movement = direction < 0 ? 'prev' : 'next';
            const exitClass = `is-exiting-${movement}`;
            const enterClass = `is-entering-${movement}`;

            lightboxImg.classList.add(exitClass);
            lightboxCaption.classList.add('is-changing');

            window.setTimeout(() => {
                setPhoto(nextIndex);
                lightboxImg.classList.remove(exitClass);
                lightboxImg.classList.add(enterClass);

                lightboxImg.offsetWidth;

                requestAnimationFrame(() => {
                    lightboxImg.classList.remove(enterClass);
                    lightboxCaption.classList.remove('is-changing');

                    window.setTimeout(() => {
                        isTransitioning = false;
                    }, 520);
                });
            }, 180);
        }
        
        // Add click event to all photo items
        photoItems.forEach((img, index) => {
            img.addEventListener('click', function() {
                openLightbox(index);
            });
        });
        
        // Navigation buttons
        prevBtn.addEventListener('click', () => {
            showPhoto(currentPhotoIndex - 1, -1);
        });
        
        nextBtn.addEventListener('click', () => {
            showPhoto(currentPhotoIndex + 1, 1);
        });
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (lightbox.classList.contains('is-open')) {
                if (e.key === 'ArrowLeft') {
                    showPhoto(currentPhotoIndex - 1, -1);
                } else if (e.key === 'ArrowRight') {
                    showPhoto(currentPhotoIndex + 1, 1);
                } else if (e.key === 'Escape') {
                    closeLightbox();
                }
            }
        });
        
        // Close lightbox when clicking X or outside the image
        closeBtn.addEventListener('click', () => {
            closeLightbox();
        });
        
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });
    </script>
